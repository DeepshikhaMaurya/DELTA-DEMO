<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
   <h1>Click <span class="badge text-bg-warning">New</span></h1>
<h4>Notification <span class="badge text-bg-danger">10+</span></h4>
<h6>Like <span class="badge text-bg-success">like &hearts;</span></h6>
</div>
<br><br>
<div class="container">
<button type="button" class="btn btn-primary">
  Notifications <span class="badge text-bg-danger">100+</span>
</button>
</div>
<br><br>
<div class="container">
    <button type="button" class="btn btn-primary position-relative">
  Inbox
  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
    99+
    <span class="visually-hidden">unread messages</span>
  </span>
</button>
</div>
<br><br>
<div class="container">
    <button type="button" class="btn btn-success position-relative">
  Profile
  <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle">
    <span class="visually-hidden">New alerts</span>
  </span>
</button>
</div>
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" rel="stylesheet" >
        </script>
